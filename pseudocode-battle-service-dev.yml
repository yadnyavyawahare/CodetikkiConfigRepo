# Pseudocode Battle Service Configuration - Development Environment
# Served by Config Server at: http://localhost:8888/pseudocode-battle-service/dev

server:
  port: 8084
  servlet:
    context-path: /api

spring:
  application:
    name: pseudocode-battle-service
  
  # Database Configuration (MySQL)
  datasource:
    url: jdbc:mysql://localhost:3307/codetikki_db
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true


# Logging Configuration
logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    com.codetikki.pseudocodebattle: DEBUG
    org.hibernate.SQL: DEBUG
  
  file:
    name: logs/pseudocode-battle-service.log
    max-size: 10MB

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
